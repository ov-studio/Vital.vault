name: Build Vault

on:
  push:
    branches: [main]
    paths:
      - 'resources/**/manifest.yaml'
      - 'resources/**/manifest.yml'
      - 'resources/*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout with submodules ────────────────────────────────────────
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── 2. Build vault.json ────────────────────────────────────────────────
      - name: Build vault.json
        run: |
          python3 - << 'PYEOF'
          import json, re, sys
          from pathlib import Path

          try:
            import yaml
          except ImportError:
            import subprocess
            subprocess.check_call([sys.executable, "-m", "pip", "install", "pyyaml", "-q"])
            import yaml

          RESOURCES_DIR = Path("resources")
          KNOWN_TAGS    = {"gamemode","utility","ui","physics","audio","networking","tools"}

          def read_manifest(path: Path):
            for name in ("manifest.yaml", "manifest.yml"):
              f = path / name
              if f.exists():
                with open(f) as fh:
                  try:    return yaml.safe_load(fh) or {}
                  except: return None
            return None

          def parse_gitmodules():
            gm = Path(".gitmodules")
            if not gm.exists(): return {}
            text, result, current_path = gm.read_text(), {}, None
            for line in text.splitlines():
              line = line.strip()
              pm = re.match(r'path\s*=\s*(.+)', line)
              um = re.match(r'url\s*=\s*(.+)',  line)
              if pm: current_path = pm.group(1).strip()
              if um and current_path:
                result[current_path] = um.group(1).strip()
                current_path = None
            return result

          def to_https(url):
            url = re.sub(r'\.git$', '', url.strip())
            return re.sub(r'^git@github\.com:', 'https://github.com/', url)

          submodule_urls = parse_gitmodules()
          resources = []

          if not RESOURCES_DIR.is_dir():
            print("No resources/ directory found", file=sys.stderr)
            sys.exit(1)

          for entry in sorted(RESOURCES_DIR.iterdir()):
            if not entry.is_dir(): continue

            manifest = read_manifest(entry)
            if manifest is None:
              print(f"  skip {entry.name} — no manifest")
              continue

            print(f"  ok   {entry.name}")

            rel_path = str(entry)
            sub_url  = submodule_urls.get(rel_path)
            is_sub   = sub_url is not None

            if is_sub:
              src_url         = to_https(sub_url)
              dl_url          = f"{src_url}/archive/refs/heads/main.zip"
              author_fallback = src_url.rstrip("/").split("/")[-2]
            else:
              repo_root       = "https://github.com/${{ github.repository }}"
              src_url         = f"{repo_root}/tree/main/{rel_path}"
              dl_url          = None  # directory resources are zipped client-side, no link needed
              author_fallback = "${{ github.repository_owner }}"

            s   = lambda k, fb="N/A": str(manifest[k]).strip() if manifest.get(k) not in (None,"") else fb
            b   = lambda k, fb=False: bool(manifest[k]) if isinstance(manifest.get(k), bool) else fb
            lst = lambda k: [t for t in (manifest.get(k) or []) if t in KNOWN_TAGS] if isinstance(manifest.get(k), list) else []

            author_name = s("author", author_fallback)

            resources.append({
              "id":            f"{'sub' if is_sub else 'dir'}:{entry.name}",
              "name":          s("name", entry.name),
              "author":        author_name,
              "author_url":    s("author_url", f"https://github.com/{author_name}"),
              "version":       s("version", "0.0.0"),
              "tagline":       s("tagline"),
              "description":   s("description"),
              "tags":          lst("tags"),
              "banner":        s("banner", "") or None,
              "featured":      b("featured"),
              "is_submodule":  is_sub,
              "source_url":    src_url,
              "download_url":  dl_url,
            })

          resources.sort(key=lambda r: (0 if r["featured"] else 1, r["name"].lower()))

          Path("vault.json").write_text(json.dumps({
            "generated_at": "${{ github.event.head_commit.timestamp || github.run_started_at }}",
            "commit":       "${{ github.sha }}",
            "count":        len(resources),
            "resources":    resources,
          }, indent=2))
          print(f"\nBuilt vault.json — {len(resources)} resource(s)")
          PYEOF

      # ── 3. Show what was built ─────────────────────────────────────────────
      - name: Show vault.json
        run: cat vault.json

      # ── 4. Commit vault.json to main ────────────────────────────────────────
      # This is what the Next.js site actually fetches from at runtime.
      - name: Commit vault.json to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vault.json
          if git diff --cached --quiet; then
            echo "vault.json unchanged, nothing to commit"
          else
            git commit -m "chore: update vault.json [skip ci]"
            git push origin HEAD:main
          fi

      # ── 5. Purge the jsDelivr CDN cache ─────────────────────────────────────
      # The site fetches vault.json via jsDelivr (cdn.jsdelivr.net/gh/...)
      # rather than raw.githubusercontent.com. Both are CDN-fronted with CORS
      # enabled, but raw.githubusercontent.com has no public purge mechanism —
      # you just wait out its cache TTL, and query-string cache-busting doesn't
      # work because its CDN ignores query strings when keying the cache.
      # jsDelivr exposes an explicit purge endpoint, so we call it right after
      # pushing to force an immediate refresh instead of waiting on a TTL.
      - name: Purge jsDelivr cache
        run: |
          curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/vault.json"
          echo "Purge requested for vault.json"